---
- name: Set role defaults
  set_fact:
    neovim: "{{ role_defaults | combine(neovim, recursive=True) }}"

- name: Check if neovim is installed
  stat:
    path: /usr/share/nvim
  register: nvim_dir

- name: Check neovim version
  ansible.builtin.shell: "nvim --version | head -1"
  register: nvim_version
  changed_when: false
  failed_when: false
  when: nvim_dir.stat.exists

- name: Install and Configure Neovim
  when: >
    base.force or not nvim_dir.stat.exists or
    neovim.version not in nvim_version.stdout
  block:
    - name: Install Neovim with Bob
      ansible.builtin.shell: 'bob use {{ neovim.version }}'
      register: nvim_install
      changed_when: "'is already installed and used' not in nvim_install.stdout"
    - name: Install Neovim dnf dependencies
      dnf:
        name:
          - git
          - unzip
          - python3
          - python3-pip
          - tmux
          - nodejs
          - npm
          - fzf
          - curl
          - wget
          - clang-devel # needed for tree-sitter-cli
          - jq
          - ImageMagick-devel
          - luarocks
        state: present
      become: true
    - name: Install Neovim Lua dependencies
      ansible.builtin.command: luarocks --local --lua-version=5.1 install magick
    - name: Install Neovim Rust dependencies
      community.general.cargo:
        name:
          - ripgrep
          - fd-find
          - git-delta
          - bat
          - tree-sitter-cli
    - name: Install Neovim Node dependencies
      ansible.builtin.command: bun install -g @mermaid-js/mermaid-cli
    - name: Install EasyDotnet server
      ansible.builtin.command: dotnet tool install -g EasyDotnet
    - name: Install Roslyn server
      ansible.builtin.command: dotnet tool install -g roslyn-language-server --prerelease --source https://pkgs.dev.azure.com/azure-public/vside/_packaging/vs-impl/nuget/v3/index.json
    - name: Configure Neovim
      include_role:
        name: neovim-configure
