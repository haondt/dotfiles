- name: Set role defaults
  set_fact:
    zsh: "{{ role_defaults | combine(zsh, recursive=True) }}"
- name: Deploy .zshrc
  template:
    src: .zshrc.j2
    dest: "{{ ansible_facts['user_dir'] }}/.zshrc"
- name: Deploy haondt.zsh-theme
  copy:
    src: haondt.zsh-theme
    dest: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh/custom/themes/haondt.zsh-theme"
