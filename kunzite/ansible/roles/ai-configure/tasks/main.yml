- name: Set role defaults
  set_fact:
    ai: "{{ role_defaults | combine(ai, recursive=True) }}"

- name: Configure Claude
  when: ai.claude.enabled
  block:

    - name: Install Claude settings
      when: ai.claude.settings is defined
      block:
        - name: Ensure ~/.claude directory exists
          ansible.builtin.file:
            path: "{{ ansible_facts['user_dir'] }}/.claude"
            state: directory
        - name: Write Claude Code settings.json
          ansible.builtin.copy:
            content: "{{ ai.claude.settings | to_nice_json }}\n"
            dest: "{{ ansible_facts['user_dir'] }}/.claude/settings.json"
            mode: "0600"

- name: Configure OpenCode
  when: ai.opencode.enabled
  block:
    - name: Install OpenCode settings
      when: ai.opencode.settings is defined
      block:
        - name: Ensure ~/.config/opencode directory exists
          ansible.builtin.file:
            path: "{{ ansible_facts['user_dir'] }}/.config/opencode"
            state: directory
        - name: Write OpenCode config.json
          when: ai.opencode.settings.config is not none
          ansible.builtin.copy:
            content: >-
              {{
                (
                  {"$schema": "https://opencode.ai/config.json"}
                  | combine(ai.opencode.settings.config)
                )
                | to_nice_json
              }}
            dest: "{{ ansible_facts['user_dir'] }}/.config/opencode/opencode.json"
            mode: "0600"
        - name: Write OpenCode tui.json
          when: ai.opencode.settings.tui is not none
          ansible.builtin.copy:
            content: >-
              {{
                (
                  {"$schema": "https://opencode.ai/tui.json"}
                  | combine(ai.opencode.settings.tui)
                )
                | to_nice_json
              }}
            dest: "{{ ansible_facts['user_dir'] }}/.config/opencode/tui.json"
            mode: "0600"
