enabled: true
claude:
  enabled: true
  settings:
    theme: dark
    statusLine:
      type: command
      command: "jq -r '\"[\\(.model.display_name)] \\(.context_window.used_percentage // 0)% context\"'"
opencode:
  enabled: true
  settings:
    config:
      shell: zsh
      permission:
        "*": ask
        read: allow
        webfetch: allow
        glob: allow
        task: allow
        skill: allow
        lsp: allow
        question: allow
        websearch: allow
        todowrite: allow
        bash:
          "git diff *": allow
          "git status *": allow
          "git commit *": ask
          "git push": deny
          "git log *": deny
          "git add *": allow
          "ls *": allow
          "find *": allow
          "head *": allow
          "tail *": allow
          "echo *": allow
          "cat *": allow
          "test *": allow
          "wc *": allow
          "kanon todo *": allow
          "kanon session *": allow
          "dotnet build *": allow
          "dotnet test *": allow
        grep: allow
      agent:
        build:
          model: opencode-go/kimi-k2.6
        auto:
          description: unrestricted edits
          mode: primary
          model: opencode-go/kimi-k2.7-code
          permission:
            edit: allow
            bash:
              "mkdir *": allow
              "rm *": allow
        fast:
          description: A faster model
          mode: primary
          model: opencode/mimo-v2.5-free
          permission:
            edit: allow
            bash:
              "mkdir *": allow
              "rm *": allow
        plan:
          disable: true
      lsp: true
    tui:
      # see https://opencode.ai/docs/themes#built-in-themes
      theme: tokyonight
      mouse: false
      keybinds:
        messages_page_down: ctrl+d
        messages_page_up: ctrl+u
